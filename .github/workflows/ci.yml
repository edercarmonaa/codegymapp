name: CodeGymApp CI

on:
  push:
    branches: [main, hosting]
  pull_request:
    branches: [main, hosting]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php-lint:
    name: PHP 8.3 syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: none

      - name: Validate PHP files
        run: find app routes config tools -name '*.php' -print0 | xargs -0 -n1 php -l

  android:
    name: Android tests and release
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Test and build release
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest :app:assembleRelease

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            android/app/build/reports/tests/
            android/app/build/reports/lint-results-*.html
          if-no-files-found: ignore
          retention-days: 7
